<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Renderer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <aside id="toolbar">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="select" title="Select (V)">
          <svg viewBox="0 0 24 24"><path d="M4 2l16 8-8 2-4 8z"/></svg>
        </button>
        <button class="tool-btn" data-tool="pen" title="Pen (P)">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </button>
        <button class="tool-btn" data-tool="brush" title="Brush (B)">
          <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34a1 1 0 0 0-1.41 0L9 12.25 11.75 15l8.96-8.96a1 1 0 0 0 0-1.41z"/></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
          <svg viewBox="0 0 24 24"><path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.77-.78 2.04 0 2.83L5.03 20H20v-2h-6.17l7.08-7.08c.78-.78.78-2.05 0-2.83L16.55 3.59C16.16 3.2 15.65 3 15.14 3z"/></svg>
        </button>
      </div>

      <div class="tool-group">
        <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="ellipse" title="Ellipse (O)">
          <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Line (L)">
          <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="arrow" title="Arrow (A)">
          <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5" stroke="currentColor" stroke-width="2"/><polyline points="12,5 19,5 19,12" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="tool-btn" data-tool="text" title="Text (T)">
          <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
        </button>
      </div>

      <div class="tool-group">
        <button class="tool-btn" data-tool="fill" title="Fill (G)">
          <svg viewBox="0 0 24 24"><path d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15a1.49 1.49 0 0 0 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.53 0-2.12zM5.21 10L10 5.21 14.79 10H5.21zM19 11.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z"/><path d="M0 20h24v4H0z" opacity=".36"/></svg>
        </button>
        <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
          <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34a1 1 0 0 0-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.41 1.41-6.6 6.6A2 2 0 0 0 5 16v3h3a2 2 0 0 0 1.42-.59l6.6-6.6 1.41 1.42 1.42-1.42-1.42-1.41 3.12-3.12a1 1 0 0 0 0-1.65z"/></svg>
        </button>
        <button class="tool-btn" data-tool="zoom" title="Zoom (Z)">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
        <button class="tool-btn" data-tool="pan" title="Pan (H)">
          <svg viewBox="0 0 24 24"><path d="M23 5.5V20c0 2.2-1.8 4-4 4h-7.3c-1.08 0-2.1-.43-2.85-1.19L1 14.83s1.26-1.23 1.3-1.25c.22-.19.49-.29.79-.29.22 0 .42.06.6.16l4.31 2.76V4c0-.83.67-1.5 1.5-1.5S11 3.17 11 4v7h1V1.5c0-.83.67-1.5 1.5-1.5S15 .67 15 1.5V11h1V2.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5V11h1V5.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5z"/></svg>
        </button>
      </div>

      <div class="divider"></div>

      <!-- Stroke & Fill colors -->
      <div class="color-section">
        <div id="fill-swatch" class="swatch fill-swatch" title="Fill color"></div>
        <div id="stroke-swatch" class="swatch stroke-swatch" title="Stroke color"></div>
        <button id="swap-colors" title="Swap colors">⇄</button>
      </div>

      <!-- Size controls -->
      <div class="size-section">
        <label>Size</label>
        <input type="range" id="brush-size" min="1" max="100" value="4" />
        <span id="size-val">4</span>
      </div>
      <div class="size-section">
        <label>Opacity</label>
        <input type="range" id="opacity-range" min="0" max="100" value="100" />
        <span id="opacity-val">100</span>
      </div>

      <div class="divider"></div>

      <!-- History -->
      <div class="tool-group">
        <button id="undo-btn" class="tool-btn" title="Undo (Ctrl+Z)">↩</button>
        <button id="redo-btn" class="tool-btn" title="Redo (Ctrl+Y)">↪</button>
      </div>

      <div class="tool-group">
        <button id="clear-btn" class="tool-btn" title="Clear canvas">✕</button>
        <button id="export-btn" class="tool-btn" title="Export PNG">⬇</button>
      </div>
    </aside>

    <!-- Canvas area -->
    <main id="canvas-area">
      <div id="canvas-container">
        <canvas id="bg-canvas"></canvas>
        <canvas id="main-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
        <div id="text-input-wrapper" style="display:none;">
          <textarea id="text-input" placeholder="Type here..."></textarea>
        </div>
      </div>
    </main>

    <!-- Right panel -->
    <aside id="right-panel">
      <!-- Color picker -->
      <section class="panel-section">
        <h3>Color</h3>
        <div id="color-wheel-container">
          <canvas id="color-wheel" width="160" height="160"></canvas>
          <canvas id="value-slider" width="16" height="160"></canvas>
        </div>
        <div id="hex-row">
          <span>#</span>
          <input type="text" id="hex-input" maxlength="6" value="000000" />
        </div>
        <div id="rgb-row">
          <input type="number" id="r-input" min="0" max="255" value="0" />
          <input type="number" id="g-input" min="0" max="255" value="0" />
          <input type="number" id="b-input" min="0" max="255" value="0" />
        </div>
        <div id="palette"></div>
      </section>

      <!-- Layers -->
      <section class="panel-section">
        <h3>Layers <button id="add-layer-btn">+</button></h3>
        <div id="layers-list"></div>
      </section>

      <!-- Transform -->
      <section class="panel-section" id="transform-section">
        <h3>Transform</h3>
        <div class="transform-row">
          <label>X</label><input type="number" id="tx" value="0"/>
          <label>Y</label><input type="number" id="ty" value="0"/>
        </div>
        <div class="transform-row">
          <label>W</label><input type="number" id="tw" value="0"/>
          <label>H</label><input type="number" id="th" value="0"/>
        </div>
        <div class="transform-row">
          <label>Rot</label><input type="number" id="tr" value="0"/>
        </div>
      </section>

      <!-- Canvas size -->
      <section class="panel-section">
        <h3>Canvas</h3>
        <div class="transform-row">
          <label>W</label><input type="number" id="canvas-w" value="1280"/>
          <label>H</label><input type="number" id="canvas-h" value="720"/>
        </div>
        <button id="resize-canvas-btn">Resize</button>
      </section>

      <!-- Memory stats -->
      <section class="panel-section" id="mem-stats">
        <h3>Memory</h3>
        <div id="mem-lines"></div>
      </section>
    </aside>
  </div>

  <!-- Color picker modal (fill / stroke) -->
  <div id="color-modal" style="display:none;">
    <div id="color-modal-inner"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
